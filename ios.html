<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 证书大全 + 应用安装</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: #f5f5f7;
            padding: 60px 20px;
        }
        .container {
            max-width: 360px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 40px;
        }
        .btn {
            display: block;
            text-decoration: none;
            padding: 18px;
            margin: 16px 0;
            border-radius: 14px;
            text-align: center;
            font-size: 17px;
            color: #fff;
        }
        /* DNS屏蔽证书 绿色 */
        .btn-config {
            background: #34c759;
        }
        /* 企业证书ZIP 橙色 */
        .btn-zip {
            background: #ff9500;
        }
        /* 在线安装APP 蓝色 */
        .btn-install {
            background: #007aff;
        }
        .tip {
            margin-top: 40px;
            font-size: 13px;
            color: #777;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>iOS 证书 & 应用安装</h1>

        <!-- 1. DNS屏蔽证书 -->
        <a href="tongyong.mobileconfig" class="btn btn-config">
            🔐 安装 DNS屏蔽证书
        </a>

        <!-- 2. 企业证书压缩包 -->
        <a href="证书(ChinaPower).zip" class="btn btn-zip">
            📁 下载 ChinaPower企业证书
        </a>

        <!-- 3. 在线安装签名软件 -->
        <a href="itms-services:///?action=download-manifest&url=https://iosxb.cn/xin/2.plist" class="btn btn-install">
            📦 一键安装签名应用
        </a>

        <div class="tip">
            请用 iPhone Safari 打开<br>
            先安装DNS屏蔽证书并信任<br>
            可下载企业证书备用<br>
            最后点击安装签名应用
        </div>
    </div>
</body>
</html>
