<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS DNS屏蔽证书 + 签名应用安装</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: #f5f5f7;
            padding: 60px 20px;
        }
        .container {
            max-width: 360px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 40px;
        }
        .btn {
            display: block;
            text-decoration: none;
            padding: 18px;
            margin: 16px 0;
            border-radius: 14px;
            text-align: center;
            font-size: 17px;
            color: #fff;
        }
        .cert {
            background: #34c759;
        }
        .install {
            background: #007aff;
        }
        .tip {
            margin-top: 40px;
            font-size: 13px;
            color: #777;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>iOS 一键安装</h1>

        <!-- DNS屏蔽证书 -->
        <a href="tongyong.mobileconfig" class="btn cert">
            🔐 第一步：安装 DNS屏蔽证书
        </a>

        <!-- 你指定的itms-services在线安装签名软件 -->
        <a href="itms-services:///?action=download-manifest&url=https://iosxb.cn/xin/2.plist" class="btn install">
            📦 第二步：安装签名应用
        </a>

        <div class="tip">
            请用 iPhone Safari 打开<br>
            先安装DNS屏蔽证书并信任<br>
            再点击安装签名应用即可
        </div>
    </div>
</body>
</html>
