<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS DNS屏蔽 & 应用下载</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: #f5f5f7;
            padding: 60px 20px;
        }
        .container { max-width: 360px; margin: 0 auto; }
        h1 { text-align: center; color: #333; font-size: 22px; margin-bottom: 40px; }
        .btn {
            display: block;
            text-decoration: none;
            padding: 18px;
            margin: 16px 0;
            border-radius: 14px;
            text-align: center;
            font-size: 17px;
            color: white;
        }
        .cert-btn { background-color: #34c759; }
        .ipa-btn { background-color: #007aff; }
        .tip {
            margin-top: 40px;
            font-size: 13px;
            color: #777;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>iOS 安装工具</h1>

        <!-- DNS屏蔽证书按钮，固定不变 -->
        <a href="tongyong.mobileconfig" class="btn cert-btn">
            🔐 第一步：安装 DNS屏蔽证书
        </a>

        <!-- 这里会自动生成所有ipa的下载按钮 -->
        <div id="ipaList"></div>

        <div class="tip">
            请用 iPhone Safari 打开此页面<br>
            优先安装【DNS屏蔽证书】<br>
            安装后前往 设置 → 通用 → VPN与设备管理 信任<br>
            再下载IPA安装包使用安装器安装
        </div>
    </div>

    <script>
        // ========== 这里只需要填你的ipa文件名，其他不用改 ==========
        const ipaFiles = [
            // 例子：
            "ESign_轻松签_4.8.2.ipa",
            "uz.ipa",
            // "又一个软件.ipa"
        ];
        // =========================================================

        const baseUrl = location.href.substring(0, location.href.lastIndexOf('/') + 1);
        const ipaListEl = document.getElementById('ipaList');

        // 自动生成所有ipa的下载按钮
        ipaFiles.forEach(fileName => {
            const btn = document.createElement('a');
            btn.href = baseUrl + fileName;
            btn.className = 'btn ipa-btn';
            // 自动从文件名里提取软件名（去掉版本号、特殊字符）
            let appName = fileName.replace(/\.ipa$/i, '').split('@')[0].split('_').join(' ');
            btn.textContent = `📦 下载 ${appName}`;
            ipaListEl.appendChild(btn);
        });
    </script>
</body>
</html>
