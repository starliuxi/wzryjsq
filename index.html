<div class="container">
    <div class="card">

                <div class="local-time-value" id="localTime">--:--:--</div>

                    <div class="local-date-value" id="localWeekday">星期-</div>
                </div>
            </div>
            
            <div class="textarea-wrapper">
                <textarea id="rawData" rows="6" wrap="soft" placeholder="粘贴数据或从链接自动加载"></textarea>
                <div class="textarea-actions">
                    <button class="action-btn" id="pasteBtn" onclick="pasteText()">粘贴</button>
                    <button class="action-btn" id="copyBtn" onclick="copyText()">复制</button>
                </div>
            </div>
            
            <div class="btn-group">
                <button id="calcBtn">计算</button>

            </div>

<script>
function pasteText() {
    const pasteBtn = document.getElementById('pasteBtn');
    const textarea = document.getElementById('rawData');
    
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(text => {
            textarea.value = text;
            pasteBtn.classList.add('pasted');
            pasteBtn.textContent = '已粘贴';
            setTimeout(() => {
                pasteBtn.classList.remove('pasted');
                pasteBtn.textContent = '粘贴';
            }, 1500);
        }).catch(() => {
            textarea.focus();
        });
    } else {
        textarea.focus();
    }
}

function copyText() {
    const textarea = document.getElementById('rawData');
    const copyBtn = document.getElementById('copyBtn');
    
    textarea.select();
    try {
        navigator.clipboard.writeText(textarea.value).then(() => {
            copyBtn.classList.add('copied');
            copyBtn.textContent = '已复制';
            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtn.textContent = '复制';
            }, 1500);
        }).catch(() => {
            document.execCommand('copy');
            copyBtn.classList.add('copied');
            copyBtn.textContent = '已复制';
            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtn.textContent = '复制';
            }, 1500);
        });
    } catch (err) {
        document.execCommand('copy');
        copyBtn.classList.add('copied');
        copyBtn.textContent = '已复制';
        setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.textContent = '复制';
        }, 1500);
    }
}

const CROP_CONFIG = {
  1:  { name: '1小时',  fullWater: 20,   reduce: 5,  minInterval: 2 },
  8:  { name: '8小时',  fullWater: 160,  reduce: 40, minInterval: 16 },
  16: { name: '16小时', fullWater: 320,  reduce: 80, minInterval: 32 },
  32: { name: '32小时', fullWater: 640,  reduce: 160, minInterval: 64 }
};

let currentZones = [];
let zoneRealData = {};
let now = new Date();

function updateLocalTime() {
  now = new Date();
  let h = now.getHours().toString().padStart(2, '0');
  let m = now.getMinutes().toString().padStart(2, '0');
  let s = now.getSeconds().toString().padStart(2, '0');
  let Y = now.getFullYear();
  let M = (now.getMonth()+1).toString().padStart(2, '0');
  let D = now.getDate().toString().padStart(2, '0');
  let wd = '日一二三四五六'[now.getDay()];
  document.getElementById('localTime').textContent = `${h}:${m}:${s}`;
  document.getElementById('localDate').textContent = `${Y}年${M}月${D}`;
  document.getElementById('localWeekday').textContent = `星期${wd}`;
}

function parseLineWithDate(line) {
    let m = line.match(/^(.+?区)：(.+?)┆(.+?)\s*\((.+?)\)\s*(\d+\/\d+)?\s*(\d+)?$/);
    if (!m) return null;
    let name = m[1];
    let mtRaw = m[2].trim();
    let dtRaw = m[3].trim();
    let rem = m[4];
    let baseMD = m[5] || "";
    let cropOverride = m[6] ? parseInt(m[6]) : null;
    if (cropOverride && ![1,8,16,32].includes(cropOverride)) cropOverride = null;
    let mt = parseTimeWithPrefix(mtRaw);
    let dt = parseTimeWithPrefix(dtRaw);
    return {
        name, rem, baseMD, cropOverride,
        mtHm: mt.hm, mtOffset: mt.offset,
        dtHm: dt.hm, dtOffset: dt.offset
    };
}

function parseTimeWithPrefix(s) {
    s = s.trim().toUpperCase();
    let offset = 0;
    if (s.startsWith('T')) offset = 1;
    else if (s.startsWith('R')) offset = 2;
    let hm = s.replace(/^[TR]/,'');
    return { offset, hm };
}

function getAbsDate(baseMD, offset, hmStr) {
    let base = new Date();
    if (baseMD) {
        let [mo, d] = baseMD.split('/').map(Number);
        base.setMonth(mo - 1);
        base.setDate(d);
    }
    let [h, mi] = hmStr.split(':').map(Number);
    base.setHours(h, mi, 0, 0);
    base.setDate(base.getDate() + offset);
    return base;
}

// 还原原版：带h、带m，不改成中文，补回分钟m
function toHm(min) {
  min = Math.max(0, Math.round(min));
  let h = Math.floor(min / 60);
  let m = min % 60;
  return `${h}h${m}m`;
}

function parseRemaining(str) {
  let m = str.match(/(\d+)h(\d+)m/) || str.match(/(\d+)m/) || str.match(/(\d+)h/);
  if (!m) return 0;
  if(m[2]) return parseInt(m[1])*60 + parseInt(m[2]);
  if(str.includes('h')) return parseInt(m[1])*60;
  return parseInt(m[1]);
}

function getCrop(r, cropOverride) {
  if (cropOverride && CROP_CONFIG[cropOverride]) return CROP_CONFIG[cropOverride];
  if (r > 320) return CROP_CONFIG[32];
  if (r > 160) return CROP_CONFIG[16];
  if (r > 20) return CROP_CONFIG[8];
  return CROP_CONFIG[1];
}

function parseLines(text) {
  let zones = [];
  let lines = text.split(/\n/).filter(l => l.trim() && !l.includes('∴') && !l.includes('————'));
  for (let line of lines) {
    let z = parseLineWithDate(line);
    if (z) zones.push(z);
  }
  return zones;
}

function calculateRealPlan(M, R, W, fullReduce) {
  let plan = [];
  let t = 0, cm = M, cr = R;
  while (true) {
    let K = Math.floor((4 * cm - W + cr) / 5);
    K = Math.max(0, K);
    let kill = t + K;
    let dry = t + cr;
    if (kill <= dry) {
      let add = W - cr + K;
      let red = Math.floor(add / 4);
      plan.push({ type: 'kill', t: kill, add, red });
      break;
    }
    plan.push({ type: 'water', t: dry, add: W, red: fullReduce });
    cm -= fullReduce + (dry - t);
    cr = W;
    t = dry;
    if (plan.length > 20 || cm <= 0) break;
  }
  return plan;
}

function adjustEvents(events, minInterval) {
    if (events.length < 2) return events;
    let arr = events.map(e => ({ ...e }));
    for (let i = arr.length - 2; i >= 0; i--) {
        let gap = arr[i + 1].t - arr[i].t;
        if (gap < minInterval) {
            arr[i].t = arr[i + 1].t - minInterval;
            if (arr[i].t < 0) arr[i].t = 0;
        }
    }
    return arr;
}

// 计算今天/明天/后天 成熟文案
function getMatureTag(fullDate) {
  let nowDay = new Date().setHours(0,0,0,0);
  let tarDay = new Date(fullDate).setHours(0,0,0,0);
  let diffDay = Math.round((tarDay - nowDay) / (1000*60*60*24));
  let hh = fullDate.getHours().toString().padStart(2,'0');
  let mm = fullDate.getMinutes().toString().padStart(2,'0');
  let timeStr = `${hh}:${mm}`;
  if(diffDay === 0) return timeStr;
  if(diffDay === 1) return "明天 " + timeStr;
  if(diffDay === 2) return "后天 " + timeStr;
  return timeStr;
}

function computeZoneReal(zone) {
  let nowMs = now.getTime();
  let dryDate = getAbsDate(zone.baseMD, zone.dtOffset, zone.dtHm);
  let dryMs = dryDate.getTime();
  let R0 = parseRemaining(zone.rem);
  let crop = getCrop(R0, zone.cropOverride);
  let W = crop.fullWater;
  let fullReduce = crop.reduce;
  let minInterval = crop.minInterval;

  let fullTimeMs = dryMs - W * 60 * 1000;
  let elapsedMs = nowMs - fullTimeMs;
  let currentWaterSec = Math.max(0, W * 60 - elapsedMs / 1000);
  let currentWaterMin = currentWaterSec / 60;
  let pct = Math.min(100, Math.max(0, currentWaterMin / W * 100));

  let matureDate = getAbsDate(zone.baseMD, zone.mtOffset, zone.mtHm);
  let matureMs = matureDate.getTime();
  let M = Math.max(0, (matureMs - nowMs) / 60000);
  
  let canAddWater = W - currentWaterMin;

  const LIMIT = 64;
  let initR = Math.min(W, Math.max(0, currentWaterMin));
  let steps = [];
  if (!(canAddWater < LIMIT && M < LIMIT)) {
      steps = calculateRealPlan(M, initR, W, fullReduce);
  }

  let isDryNow = dryMs < nowMs;
  let events = [];

  if(isDryNow && currentWaterMin <= 0 && M > 0){
      events.push({ type: 'water', t: 0, add: W, red: fullReduce });
  }

  steps.forEach(e => {
    events.push({ ...e });
  });

  let seen = new Set();
  let uniqueEvents = [];
  for (let e of events) {
      if (!seen.has(e.t)) {
          seen.add(e.t);
          uniqueEvents.push(e);
      }
  }

  let adjusted = adjustEvents(uniqueEvents, minInterval);

  let finalEvents = [];
  let prevT = 0;
  let cumulativeRed = 0;
  let currentR = Math.min(W, Math.max(0, currentWaterMin));
  
  for (let i = 0; i < adjusted.length; i++) {
    let e = adjusted[i];
    let dt = e.t - prevT;
    let add, red;
    
    if (e.type === 'water') {
      let cr = Math.max(0, currentR - dt);
      add = W - cr;
      red = Math.floor(add / 4);
      currentR = W;
      cumulativeRed += red;
    } else {
      let cr = Math.max(0, currentR - dt);
      let remainingM = M - cumulativeRed - e.t;
      let K = Math.floor((4 * remainingM - W + cr) / 5);
      K = Math.max(0, K);
      add = W - cr + K;
      red = Math.floor(add / 4);
      cumulativeRed += red;
      currentR = Math.max(0, cr - K + add - (e.t + K - e.t));
    }
    
    let absMs = nowMs + e.t * 60 * 1000;
    let d = new Date(absMs);
    let hh = d.getHours().toString().padStart(2, '0');
    let mm = d.getMinutes().toString().padStart(2, '0');
    
    let matureAfterMs = matureMs - cumulativeRed * 60 * 1000;
    let md = new Date(matureAfterMs);
    let matureStr = getMatureTag(md);
    
    finalEvents.push({
        type: e.type,
        t: e.t,
        add, red,
        timeStr: `${hh}:${mm}`,
        absMs: absMs,
        matureStr: matureStr
    });
    
    prevT = e.t;
  }

  let future = finalEvents.slice();
  let next = future[0];
  
  let urgent = false;
  let remainMatureMin = (matureMs - nowMs) / 60000;
  if(remainMatureMin <= 30 && remainMatureMin > 0){
      urgent = true;
  }

  // 只取时分，不要月日
  let mDate = new Date(matureMs);
  let showMatureTime = `${mDate.getHours().toString().padStart(2,'0')}:${mDate.getMinutes().toString().padStart(2,'0')}`;

  return {
    crop, W, currentWaterMin, pct,
    events: finalEvents, future, next, count: future.length,
    baseMD: zone.baseMD, cropOverride: zone.cropOverride,
    isDryNow, isMature: M <= 0,
    matureTime: zone.mtHm,
    matureTs: matureMs,
    minInterval,
    urgent,
    remainMatureMin,
    canAddWater: canAddWater,
    remainMature: M,
    showMatureTime: showMatureTime
  };
}

function render() {
  let zones = currentZones;
  if (!zones.length) {
    document.getElementById('resultArea').innerHTML = `<div class="stats"></div><div style="text-align:center;padding:20px;color:#888;">暂无数据</div>`;
    return;
  }
  let html = `<div class="stats">共${zones.length}区</div><div class="zone-list">`;
  const LIMIT = 64;
  
  zones.forEach((z, i) => {
    let id = `z${i}`;
    let d = computeZoneReal(z);
    zoneRealData[id] = d;

    let nextStr, clsName;
    if(d.isMature){
        nextStr = "可收获";
        clsName = 'done';
    }else if(d.next){
        nextStr = d.next.timeStr;
        clsName = d.isDryNow ? 'now' : '';
    }else{
        nextStr = d.showMatureTime;
        clsName = 'done';
    }

    let urgentClass = d.urgent ? ' urgent' : '';
    let isNeedNatural = (d.canAddWater < LIMIT && d.remainMature < LIMIT);

    html += `
    <div class="zone-item">
      <div class="zone-header${d.isMature ? ' no-expand' : ''}"${d.isMature ? '' : ` onclick="toggle('${id}')"`}>
        <span class="zone-name">${z.name}</span>
        <span class="crop-hour">${d.crop.name.replace('小时','')}H</span>
        <span class="next-water ${clsName}${urgentClass}">${nextStr}</span>
        <span class="zone-badge">${d.isMature ? 0 : d.count}次</span>
      </div>`;

    if (!d.isMature) {
      html += `
      <div id="${id}" class="zone-detail">
        <div class="water-progress">
          <span id="wtext-${id}" class="water-time-text">${toHm(d.currentWaterMin)}</span>
          <div class="water-bar"><div id="wbar-${id}" class="water-bar-fill" style="width:${d.pct}%"></div></div>
          <span id="wpercent-${id}" class="water-percent">${Math.round(d.pct)}%</span>
        </div>
        <div class="water-timeline">`;

      d.events.forEach(e => {
        let isCurr = d.next && e.absMs === d.next.absMs;
        let cls = e.type === 'kill' ? 'kill' : '';
        if (isCurr) cls += ' current';
        let title = e.type === 'kill' ? '斩杀' : '浇水';
        
        html += `
          <div class="water-card ${cls}">
            <div class="water-left">
              <span class="water-title">${title}</span>
              <div class="water-big-time">${e.timeStr}</div>
            </div>
            <div class="water-right">
              <span class="water-amount">+${toHm(e.add)}</span>
              <span class="water-reduce">-${toHm(e.red)}</span>
              <span class="water-mature"> ${e.matureStr}</span>
            </div>
          </div>`;
      });

      if(isNeedNatural){
          html += `<div class="tip-no-oper">可加水量、剩余成熟时间均小于64分钟，${d.showMatureTime}成熟</div>`;
      }

      html += `</div></div>`;
    }

    html += `</div>`;
  });
  html += '</div>';
  document.getElementById('resultArea').innerHTML = html;
}

function refreshWaterValues() {
  for (let id in zoneRealData) {
    let idx = parseInt(id.replace('z',''));
    if (idx >= 0 && idx < currentZones.length) {
      let d = computeZoneReal(currentZones[idx]);
      zoneRealData[id] = d;
      if (!d.isMature) {
        let wt = document.getElementById(`wtext-${id}`);
        let wp = document.getElementById(`wpercent-${id}`);
        let wb = document.getElementById(`wbar-${id}`);
        if(wt) wt.textContent = toHm(d.currentWaterMin);
        if(wp) wp.textContent = Math.round(d.pct) + '%';
        if(wb) wb.style.width = d.pct + '%';
      }
    }
  }
}

window.toggle = id => {
  let el = document.getElementById(id);
  if(el) el.classList.toggle('open');
};

function sortByNext() {
  if (!currentZones.length) return;
  let matureList = [];
  let normalList = [];
  currentZones.forEach(z=>{
    let d = computeZoneReal(z);
    if(d.isMature) matureList.push(z);
    else normalList.push(z);
  });
  normalList.sort((a, b) => {
    let da = computeZoneReal(a);
    let db = computeZoneReal(b);
    let ta = da.next ? da.next.absMs : da.matureTs;
    let tb = db.next ? db.next.absMs : db.matureTs;
    return ta - tb;
  });
  currentZones = [...normalList, ...matureList];
  render();
}

document.getElementById('calcBtn').onclick = () => {
  currentZones = parseLines(document.getElementById('rawData').value);
  render();
};
document.getElementById('sortBtn').onclick = sortByNext;
document.getElementById('clearBtn').onclick = () => {
  document.getElementById('rawData').value = '';
  currentZones = [];
  zoneRealData = {};
  document.getElementById('resultArea').innerHTML = '<div class="stats"></div>';
};

window.addEventListener('load', () => {
  updateLocalTime();
  const params = new URLSearchParams(location.search);
  let data = params.get('data');
  if (data) {
    data = decodeURIComponent(data);
    document.getElementById('rawData').value = data;
    currentZones = parseLines(data);
    render();
  }
});

setInterval(updateLocalTime, 1000);
setInterval(refreshWaterValues, 1000);
</script>
</body>
</html>
